name: CI / Publish

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: src/RalphLoop/RalphLoop.csproj
  NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  # ─────────────────────────────────────────────
  # Build & Test — runs on every push / PR
  # ─────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for git-based versioning

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      - name: Run tests
        # The project has no test project yet; this is a no-op stub that will
        # automatically pick up any *Tests.csproj added later.
        run: |
          TEST_PROJECTS=$(find . -name "*Tests.csproj" -o -name "*Test.csproj" | head -1)
          if [ -n "$TEST_PROJECTS" ]; then
            dotnet test --no-build --configuration Release --verbosity normal
          else
            echo "No test projects found — skipping test step."
          fi

  # ─────────────────────────────────────────────
  # Pack & Publish — runs only on version tags
  # ─────────────────────────────────────────────
  publish:
    name: Pack & Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    # Only publish when a version tag is pushed (e.g. v1.2.3 or v1.2.3-beta.1)
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Strip the leading "v" from the tag to get a valid NuGet version string.
      # e.g. refs/tags/v1.2.3 → 1.2.3
      - name: Resolve package version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Pack NuGet tool package
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --no-restore \
            --configuration Release \
            --output ./nupkg \
            /p:Version=${{ steps.version.outputs.VERSION }} \
            /p:PackageReleaseNotes="Release ${{ steps.version.outputs.VERSION }} — see CHANGELOG or tag notes for details."

      - name: Register GitHub Packages NuGet source
        run: |
          dotnet nuget add source "${{ env.NUGET_SOURCE }}" \
            --name "github" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --source "github" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      # Upload the .nupkg as a workflow artifact so it can be downloaded directly
      # from the Actions run page without pulling from the registry.
      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ralph-loop-${{ steps.version.outputs.VERSION }}
          path: ./nupkg/*.nupkg
          retention-days: 90
